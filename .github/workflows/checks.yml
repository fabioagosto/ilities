name: checks

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # The rubric lives once in _shared/ and is assembled into each skill's
      # references/rubric.md by build.py. Fail if any committed copy is stale,
      # so a hand-edited rubric or a forgotten rebuild cannot merge.
      - name: Rubrics are in sync with _shared/
        run: python build.py --check

      # House rule: no em dashes or en dashes anywhere. This matches only the
      # en dash (U+2013) and em dash (U+2014) by codepoint, so arrows are fine.
      - name: No em or en dashes
        run: |
          if grep -rInP '[\x{2013}\x{2014}]' --include='*.md' --include='*.py' .; then
            echo "::error::Found em or en dashes above. Replace them with plain punctuation."
            exit 1
          fi
